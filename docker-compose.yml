name: eve-station-trader-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eve_trader
      POSTGRES_USER: eve_trader
      POSTGRES_PASSWORD: eve_trader
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eve_trader -d eve_trader"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://eve_trader:eve_trader@postgres:5432/eve_trader
      REDIS_URL: redis://redis:6379/0
      ESI_CLIENT_ID: change-me
      ESI_CLIENT_SECRET: change-me
      ESI_CALLBACK_URL: http://localhost:8000/api/auth/callback
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
    command: python -m app.workers.scheduler.runner
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://eve_trader:eve_trader@postgres:5432/eve_trader
      REDIS_URL: redis://redis:6379/0
      ESI_CLIENT_ID: change-me
      ESI_CLIENT_SECRET: change-me
      ESI_CALLBACK_URL: http://localhost:8000/api/auth/callback
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
